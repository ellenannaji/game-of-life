<!DOCTYPE html>

<html>

<head>

<title>Register - TaskVerse</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<h1>Create Account 🚀</h1>


<input 
type="text" 
id="name"
placeholder="Enter your name">


<input 
type="email" 
id="email"
placeholder="Enter your email">


<input 
type="password"
id="password"
placeholder="Create password">
<select id="role">

<option value="user">
Normal User
</option>

<option value="reviewer">
Reviewer
</option>

</select>

<button onclick="register()">
Register
</button>


<p>
Already have an account?
<a href="login.html">
Login
</a>
</p>


</div>



<script src="app.js"></script>


</body>

</html>
